<form (ngSubmit)="onSubmit()">
  <div class="input-group">
    <p>
      <label for="initial-investment">Valor Inicial</label>
      <input
        type="number"
        id="initial-investment"
        [(ngModel)]="enteredInitialInvestment"
        name="initial-investment"
      />
    </p>
    <p>
      <label for="annual-investment">Investimento Anual</label>
      <input
        type="number"
        id="annual-investment"
        [(ngModel)]="enteredAnnualInvestment"
        name="annual-investment"
      />
    </p>
    <p>
      <label for="expected-return">Retorno Esperado</label>
      <input
        type="number"
        id="expected-return"
        [(ngModel)]="enteredExpectedReturn"
        name="expected-return"
      />
    </p>
    <p>
      <label for="duration">Duração</label>
      <input
        type="number"
        id="duration"
        [(ngModel)]="enteredDuration"
        name="duration"
      />
    </p>
  </div>
  <p>
    <button title="Calcular" type="submit">Calcular</button>
  </p>
</form>
